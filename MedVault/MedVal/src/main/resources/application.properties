# ===================================================================
# SERVER
# ===================================================================
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===================================================================
# FILE UPLOADS
# ===================================================================
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.web.resources.static-locations=file:${FILE_UPLOAD_DIR:uploads}/,classpath:/static/

# ===================================================================
# MAIL CONFIGURATION - BREVO SMTP
# ===================================================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
mail.from.email=${MAIL_FROM_EMAIL:${SPRING_MAIL_USERNAME}}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================================================================
# FRONTEND URL
# ===================================================================
frontend.url=${FRONTEND_URL}

# ===================================================================
# CUSTOM APPLICATION SETTINGS
# ===================================================================
appointments.status-update-interval-ms=${APPOINTMENT_STATUS_UPDATE_INTERVAL_MS:3600000}

# ===================================================================
# ACTUATOR
# ===================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never