# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
# Database Connection URL
# Connects to the 'medval_db' database on your local machine.
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Specify the MySQL driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE/JPA CONFIGURATION
# ===================================================================
# This will automatically update the database schema based on your entities.
spring.jpa.hibernate.ddl-auto=update

# Show the actual SQL queries in the console 
spring.jpa.show-sql=true

# Specify the MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Directory for uploaded files (relative to project root)
file.upload-dir=uploads

# Allow Spring Boot to serve uploaded files
spring.web.resources.static-locations=file:uploads/,classpath:/static/
server.error.include-message=always


# =======================================
# SPRING MAIL PROPERTIES (using Gmail)
# =======================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

server.port=${PORT:8080}